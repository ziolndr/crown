

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CROWN</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,401,500,600,700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet" />
<style>

  :root {
    --bg: #f2eee6;
    --bg-2: #fffaf1;
    --tile: #d8d0c3;
    --ink: #11100e;
    --white: #11100e;
    --dim: rgba(17,16,14,0.68);
    --faint: rgba(17,16,14,0.44);
    --line: rgba(17,16,14,0.24);
    --line-2: rgba(17,16,14,0.12);
    --cream: #fff8ec;
    --paper: #f7f0e4;
    --bone: #e7dece;
    --black: #11100e;
    --red: #c83b22;
    --orange: #e56d22;
    --blue: #243c7a;
    --font: "Switzer", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  img { display: block; }

  /* ---------- hero: Kai Collective color wall x American Apparel catalog ---------- */
  .hero {
    position: relative;
    height: 100svh;
    min-height: 620px;
    overflow: hidden;
    background: var(--paper);
    border-bottom: 1px solid var(--black);
  }
  .hero::before {
    content: "";
    position: absolute;
    z-index: 3;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, rgba(17,16,14,0.42) 0%, rgba(17,16,14,0) 14%, rgba(17,16,14,0) 86%, rgba(17,16,14,0.34) 100%),
      linear-gradient(180deg, rgba(247,240,228,0.22) 0%, rgba(247,240,228,0) 22%, rgba(247,240,228,0) 78%, rgba(247,240,228,0.28) 100%);
  }
  .hero::after {
    content: "CROWN / LOOK INDEX / LIVE CATALOG";
    position: absolute;
    z-index: 5;
    right: clamp(14px, 2vw, 26px);
    bottom: clamp(14px, 2vw, 26px);
    color: rgba(17,16,14,0.72);
    background: rgba(255,248,236,0.78);
    border: 1px solid rgba(17,16,14,0.22);
    padding: 10px 12px;
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  .hgrid {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 6px;
    padding: 6px;
    overflow: hidden;
    background: var(--black);
  }
  .hcol {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    will-change: transform;
    animation: heroColumnScroll var(--hero-speed, 720s) linear infinite;
  }
  .hcol:nth-child(2n) { animation-name: heroColumnScrollReverse; --hero-speed: 840s; }
  .hcol:nth-child(3n) { --hero-speed: 960s; }
  .hgrid:hover .hcol { animation-play-state: paused; }
  .hstack {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 100svh;
  }
  .sfig {
    position: relative;
    display: block;
    width: 100%;
    aspect-ratio: 4 / 5;
    background: var(--tile);
    overflow: hidden;
    flex: 0 0 auto;
  }
  .sfig:nth-child(3n) { aspect-ratio: 1 / 1; }
  .sfig:nth-child(5n) { aspect-ratio: 3 / 4; }
  .sfig img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    opacity: 0;
    filter: saturate(1.12) contrast(1.05) brightness(1.01);
    transform: scale(1.012);
    transition: opacity .7s ease, transform 1.2s ease, filter .3s ease;
  }
  .sfig img.in { opacity: 1; transform: none; }
  .sfig:hover img { filter: saturate(1.2) contrast(1.08) brightness(1.03); transform: scale(1.025); }
  .sfig.dead { display: none; }
  .sfig::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(17,16,14,0) 58%, rgba(17,16,14,0.42) 100%);
    opacity: .16;
    transition: opacity .25s ease;
  }
  .sfig:hover::after { opacity: .34; }
  .sfig .tag {
    position: absolute;
    left: 9px;
    bottom: 8px;
    z-index: 2;
    padding: 4px 6px;
    background: rgba(17,16,14,0.82);
    color: var(--cream);
    font-size: 9px;
    letter-spacing: .16em;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .2s ease, transform .2s ease;
  }
  .sfig:hover .tag { opacity: 1; transform: none; }

  @keyframes heroColumnScroll {
    from { transform: translateY(0); }
    to { transform: translateY(-50%); }
  }
  @keyframes heroColumnScrollReverse {
    from { transform: translateY(-50%); }
    to { transform: translateY(0); }
  }

  .scrim {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 52%, rgba(247,240,228,0.20) 0%, rgba(247,240,228,0.12) 34%, rgba(17,16,14,0.10) 100%),
      linear-gradient(180deg, rgba(17,16,14,0.24) 0%, rgba(17,16,14,0.03) 32%, rgba(17,16,14,0.03) 68%, rgba(17,16,14,0.20) 100%);
  }

  .hbar {
    position: absolute;
    z-index: 4;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    gap: 0;
    min-height: 72px;
    background: rgba(255,248,236,0.92);
    border-bottom: 1px solid var(--black);
    backdrop-filter: blur(8px);
  }
  .word {
    line-height: 1;
    white-space: nowrap;
    display: flex;
    align-items: center;
    padding: 0 24px;
    color: var(--black);
    border-right: 1px solid var(--black);
  }
  .word.v1,
  .word.v2,
  .word.v3 {
    font-family: "Jost", var(--font);
    font-weight: 600;
    font-size: clamp(24px, 2.7vw, 40px);
    letter-spacing: .30em;
    text-indent: .30em;
    text-transform: uppercase;
  }
  .scope {
    display: flex;
    flex: 1;
    justify-content: flex-end;
    align-items: stretch;
    overflow-x: auto;
  }
  .scope button {
    background: rgba(255,248,236,0.0);
    border: 0;
    border-left: 1px solid rgba(17,16,14,0.18);
    cursor: pointer;
    color: rgba(17,16,14,0.64);
    font-family: var(--font);
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    padding: 0 18px;
    min-height: 72px;
    transition: color .15s ease, background .15s ease;
  }
  .scope button:hover { color: var(--black); background: rgba(200,59,34,0.10); }
  .scope button[aria-pressed="true"] { color: var(--cream); background: var(--black); }

  .hcenter {
    position: absolute;
    z-index: 4;
    left: 50%;
    top: 52%;
    transform: translate(-50%, -50%);
    width: min(860px, calc(100% - 44px));
    text-align: left;
    display: grid;
    background: rgba(255,248,236,0.94);
    border: 1px solid var(--black);
    box-shadow: 14px 14px 0 rgba(17,16,14,0.34);
  }
  .hcenter::before,
  .hcenter::after { display: none; }
  .tagline {
    font-weight: 600;
    font-size: 10px;
    letter-spacing: .24em;
    text-transform: uppercase;
    color: rgba(17,16,14,0.58);
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(17,16,14,0.18);
    background: rgba(247,240,228,0.78);
  }
  .lede {
    font-weight: 600;
    font-size: clamp(34px, 6vw, 72px);
    line-height: .98;
    letter-spacing: -.03em;
  }
  .search-line {
    width: 100%;
    display: flex;
    align-items: stretch;
    gap: 0;
    border: 0;
    border-bottom: 1px solid var(--black);
    padding: 0;
    background: var(--cream);
    transition: background .15s ease;
  }
  .search-line:focus-within { background: #fffdf7; }
  #q {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: 0;
    outline: 0;
    color: var(--black);
    font-family: "Jost", var(--font);
    font-weight: 500;
    font-size: clamp(26px, 4vw, 58px);
    letter-spacing: -.035em;
    padding: 23px 24px 25px;
  }
  #q::placeholder { color: rgba(17,16,14,0.36); font-weight: 500; }
  #go {
    flex: 0 0 92px;
    min-height: 92px;
    background: var(--red);
    color: var(--cream);
    border: 0;
    border-left: 1px solid var(--black);
    cursor: pointer;
    font-size: 30px;
    line-height: 1;
    display: grid;
    place-items: center;
    transition: background .15s ease, transform .15s ease;
  }
  #go:hover { background: var(--orange); transform: none; }
  #go:disabled { opacity: .55; cursor: default; }

  .feelings {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 0;
  }
  .feelings button {
    background: rgba(255,248,236,0.92);
    border: 0;
    border-right: 1px solid rgba(17,16,14,0.18);
    border-bottom: 1px solid rgba(17,16,14,0.18);
    color: rgba(17,16,14,0.72);
    font-family: var(--font);
    font-size: 12px;
    line-height: 1.15;
    padding: 16px 13px;
    cursor: pointer;
    transition: color .15s ease, background .15s ease;
    text-align: left;
  }
  .feelings button:last-child { border-right: 0; }
  .feelings button:hover { color: var(--cream); background: var(--black); }

  .hfoot {
    position: absolute;
    z-index: 4;
    left: clamp(12px, 2vw, 26px);
    bottom: clamp(12px, 2vw, 26px);
    color: var(--cream);
    background: rgba(17,16,14,0.88);
    border: 1px solid rgba(255,248,236,0.32);
    padding: 10px 12px;
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    backdrop-filter: blur(6px);
  }
  .hfoot.err { color: var(--cream); }

  /* ---------- results ---------- */
  .results {
    display: none;
    background: var(--paper);
    color: var(--black);
  }
  .results.on { display: block; }

  .rhead {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 28px;
    flex-wrap: wrap;
    padding: clamp(30px, 4vw, 58px) clamp(16px, 3vw, 34px) clamp(18px, 2.4vw, 28px);
    border-bottom: 1px solid var(--black);
    background: var(--cream);
  }
  .rhead .said-k { font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: rgba(17,16,14,0.52); margin-bottom: 14px; }
  .rhead .said {
    font-family: "Jost", var(--font);
    font-weight: 600;
    font-size: clamp(32px, 5.4vw, 72px);
    line-height: .94;
    letter-spacing: -.045em;
    max-width: 16ch;
  }
  .readout { display: flex; gap: 0; flex-wrap: wrap; border: 1px solid var(--black); }
  .readout > div { min-width: 104px; padding: 14px 16px; border-right: 1px solid var(--black); background: var(--paper); }
  .readout > div:last-child { border-right: 0; }
  .readout .k { display: block; font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: rgba(17,16,14,0.52); margin-bottom: 8px; }
  .readout .v { display: block; font-weight: 700; font-size: 28px; font-variant-numeric: tabular-nums; }

  .rstatus {
    padding: 14px clamp(16px, 3vw, 34px);
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(17,16,14,0.58);
    border-bottom: 1px solid var(--black);
    background: var(--paper);
  }

  .lead { display: none; }
  .lead.on { display: grid; grid-template-columns: 1.28fr 1fr; border-bottom: 1px solid var(--black); }
  .lead-shot { position: relative; background: var(--tile); min-height: clamp(420px, 64vh, 780px); overflow: hidden; border-right: 1px solid var(--black); }
  .lead-shot img { width: 100%; height: 100%; object-fit: cover; filter: saturate(1.08) contrast(1.04); }
  .lead-shot.dead img { display: none; }
  .lead-rank { position: absolute; top: 16px; left: 18px; font-weight: 700; font-size: clamp(38px, 5.4vw, 74px); letter-spacing: -.04em; color: var(--cream); text-shadow: 0 2px 18px rgba(17,16,14,0.58); }
  .lead-meta { padding: clamp(28px, 4vw, 58px); display: flex; flex-direction: column; justify-content: center; gap: 17px; background: var(--cream); }
  .lead-tag { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: rgba(17,16,14,0.52); }
  .lead-name { font-family: "Jost", var(--font); font-weight: 600; font-size: clamp(28px, 3.6vw, 52px); line-height: .96; letter-spacing: -.04em; }
  .lead-name a:hover { color: var(--red); }
  .lead-spec { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: rgba(17,16,14,0.52); }
  .lead-copy { font-size: 15px; line-height: 1.58; color: rgba(17,16,14,0.68); max-width: 52ch; }
  .lead-score { display: flex; align-items: baseline; gap: 12px; }
  .lead-score .big { font-weight: 800; font-size: 44px; font-variant-numeric: tabular-nums; }
  .lead-score .lab { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: rgba(17,16,14,0.52); }
  .lead-cta {
    margin-top: 8px;
    width: max-content;
    background: var(--black);
    color: var(--cream);
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    font-weight: 700;
    padding: 15px 20px;
    transition: background .15s ease;
  }
  .lead-cta:hover { background: var(--red); }

  .gridhead { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; flex-wrap: wrap; padding: clamp(22px,3vw,36px) clamp(16px,3vw,34px) 16px; background: var(--paper); }
  .gridhead h2 { font-weight: 700; font-size: clamp(15px, 1.8vw, 19px); letter-spacing: .06em; text-transform: uppercase; }
  .gridhead .note { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: rgba(17,16,14,0.52); }

  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 0 6px 6px; background: var(--black); }
  .tile { display: flex; flex-direction: column; background: var(--cream); opacity: 0; transform: translateY(10px); animation: rise .5s ease forwards; }
  .tile-shot { position: relative; aspect-ratio: 3 / 4; background: var(--tile); overflow: hidden; }
  .tile-shot img { width: 100%; height: 100%; object-fit: cover; transition: transform .45s ease; filter: saturate(1.08) contrast(1.04); }
  .tile:hover .tile-shot img { transform: scale(1.035); }
  .tile-shot.dead img { display: none; }
  .tile-shot.dead::after { content: "unavailable"; position: absolute; inset: 0; display: grid; place-items: center; color: rgba(17,16,14,0.52); font-size: 10px; letter-spacing: .16em; text-transform: uppercase; }
  .tile-rank { position: absolute; top: 10px; left: 11px; font-weight: 800; font-size: 26px; color: var(--cream); text-shadow: 0 2px 12px rgba(17,16,14,0.58); }
  .tile-score { position: absolute; top: 10px; right: 10px; font-weight: 700; font-size: 13px; font-variant-numeric: tabular-nums; background: rgba(255,248,236,0.88); border: 1px solid rgba(17,16,14,0.28); color: var(--black); padding: 4px 7px; }
  .tile-body { padding: 14px 14px 17px; display: grid; gap: 7px; }
  .tile-name { font-weight: 700; font-size: 17px; line-height: 1.1; letter-spacing: -.015em; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; }
  .tile-name a:hover { color: var(--red); }
  .tile-meta { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: rgba(17,16,14,0.50); }
  .tile-shop { margin-top: 2px; font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: rgba(17,16,14,0.68); font-weight: 700; }
  .tile-shop:hover { color: var(--red); }

  @keyframes rise { to { opacity: 1; transform: none; } }

  @media (max-width: 1200px) { .hgrid { grid-template-columns: repeat(5, minmax(0, 1fr)); } .hcol:nth-child(n+6) { display: none; } }
  @media (max-width: 980px) {
    .hgrid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .hcol:nth-child(n+5) { display: none; }
    .lead.on { grid-template-columns: 1fr; }
    .lead-shot { border-right: 0; border-bottom: 1px solid var(--black); }
    .grid { grid-template-columns: repeat(3, 1fr); }
    .feelings { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  @media (max-width: 680px) {
    .hgrid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .hcol:nth-child(n+4) { display: none; }
    .hbar { min-height: 0; flex-direction: column; align-items: stretch; }
    .word { justify-content: center; min-height: 58px; border-right: 0; border-bottom: 1px solid var(--black); }
    .scope { justify-content: stretch; }
    .scope button { flex: 1 1 auto; min-height: 44px; padding: 0 10px; }
    .hcenter { left: 14px; right: 14px; top: 55%; transform: translateY(-50%); width: auto; box-shadow: 8px 8px 0 rgba(17,16,14,0.34); }
    #q { font-size: clamp(22px, 7vw, 38px); padding: 18px 16px 19px; }
    #go { flex-basis: 70px; min-height: 70px; }
    .feelings { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .feelings button { font-size: 11px; padding: 13px 12px; }
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 460px) {
    .hgrid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .hcol:nth-child(n+3) { display: none; }
    .readout { width: 100%; }
    .readout > div { flex: 1; min-width: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .sfig img, .tile { transition: none !important; animation: none !important; opacity: 1 !important; transform: none !important; }
    .hcol { animation: none !important; transform: none !important; }
  }

</style>
</head>
<body>
  <section class="hero">
    <div class="hgrid" id="hgrid" aria-hidden="true"></div>
    <div class="scrim" aria-hidden="true"></div>

    <div class="hbar">
      <div class="word v1">CROWN</div>
      <nav class="scope" id="scope" aria-label="Category"></nav>
    </div>

    <div class="hcenter">
      <div class="tagline">Type a feeling, not a filter</div>
      <div class="search-line">
        <input id="q" type="text" autocomplete="off" spellcheck="false" placeholder="describe a feeling" aria-label="Describe the feeling you want" />
        <button id="go" type="button" aria-label="Search">&rarr;</button>
      </div>
      <div class="feelings" id="feelings"></div>
    </div>

    <div class="hfoot" id="srcline"></div>
  </section>

  <section class="results" id="results" aria-live="polite">
    <div class="rhead">
      <div>
        <div class="said-k">You said</div>
        <div class="said" id="said"></div>
      </div>
      <div class="readout" id="readout"></div>
    </div>
    <div class="rstatus" id="status"></div>
    <article class="lead" id="lead"></article>
    <div class="gridhead">
      <h2>More</h2>
      <div class="note">Ranked by meaning · the gap is the signal</div>
    </div>
    <div class="grid" id="grid"></div>
  </section>

<script>
(function () {
  "use strict";

  var ENDPOINTS = [
    "https://api.arbiter.traut.ai/public/compare"
  ];
  var CANDIDATE_LIMIT = 110;

  var HERO_MAX = 180;
  var HERO_PER_SOURCE = 18;
  var HERO_COLUMNS = 6;

  var PRODUCT_SOURCES = [

    { label: "Fe Noel", category: "fashion", weight: 0, home: "https://fenoel.com", feed: "https://fenoel.com/products.json?limit=250" },
    { label: "Kai Collective", category: "fashion", weight: 0, home: "https://kaicollective.com", feed: "https://kaicollective.com/products.json?limit=250" },
    { label: "Brandon Blackwood", category: "fashion", weight: 1, home: "https://brandonblackwood.com", feed: "https://brandonblackwood.com/products.json?limit=250" },
    { label: "The Lip Bar", category: "makeup", weight: 1, home: "https://thelipbar.com", feed: "https://thelipbar.com/products.json?limit=250" },
    { label: "Juvia's Place", category: "makeup", weight: 1, home: "https://www.juviasplace.com", feed: "https://www.juviasplace.com/products.json?limit=250" },
    { label: "Mented", category: "makeup", weight: 1, home: "https://www.mentedcosmetics.com", feed: "https://www.mentedcosmetics.com/products.json?limit=250" },

    if (/blazer dress|tie/.test(form)) return "tailored occasion mood with formal styling pressure";
    if (/corset|bodysuit/.test(form)) return "defined body mood with sculpted fashion pressure";

    if (warm) return "soft earthy mood with resort polish and relaxed elegance";
    if (purple) return "color-forward mood with expressive fashion presence";
    if (blue) return "casual denim mood with relaxed everyday styling";
    if (bright) return "bright expressive mood with playful visual energy";
    if (/knit/.test(material)) return "soft textured mood with relaxed wearable polish";
    if (/printed/.test(material)) return "pattern-forward mood with visual movement";
    return "catalog style mood with visible fashion presence";
  }

  function inferOccasion(form, palette, mood) {
    if (/after-dark|nightlife|dark fitted|sleek sharp/.test(mood)) return "night-out styling, statement dressing, and high-presence outfit building";
    if (/football jersey/.test(form)) return "daytime casual styling, sport dressing, and off-duty outfit building";
    if (/robe/.test(form)) return "resort layering, vacation dressing, and relaxed lounge presentation";
    if (/swim|bikini|one-piece swimsuit/.test(form)) return "poolside wear, beach dressing, and vacation presentation";
    if (/bag|clutch|trunk|case/.test(form)) return "accessory styling, outfit completion, and polished carry";
    if (/boots|sandals|footwear/.test(form)) return "footwear styling, outfit grounding, and full-look finishing";
    if (/blazer dress|tie/.test(form)) return "formal styling, tailored dressing, and event presentation";
    if (/dress|gown|jumpsuit/.test(form)) return "occasion dressing, full-look styling, and visual entrance";
    if (/top|pants|skirt|cardigan|cape|bodysuit|corset/.test(form)) return "separates styling, outfit layering, and wardrobe composition";
    return "catalog styling, product selection, and visual presentation";
  }

  function buildArbiterCandidateText(source, product, title, type, tags, description) {
    var catLabel = CAT_LABEL[source.category] || source.category || "Catalog";
    var cleanTitle = cleanCandidateTitle(title) || cleanCandidatePhrase(title, 80) || "Catalog item";
    var form = inferProductForm(source, cleanTitle, type, [], description);
    var palette = inferPalette(cleanTitle, description);
    var material = inferMaterial(cleanTitle, description);
    var silhouette = inferSilhouette(form, cleanTitle, description);
    var mood = inferMood(form, palette, material, cleanTitle, description);
    var occasion = inferOccasion(form, palette, mood);

    return [
      catLabel + " product.",
      cleanTitle + ".",
      titleCaseFirst(form) + ".",
      palette + ".",
      material + ".",
      silhouette + ".",
      mood + ".",
      occasion + "."
    ].join(" ").replace(/\s+/g, " ").trim();
  }
  function normalizeProduct(source, product) {
    if (!keepProduct(source, product)) return null;
    var title = cleanText(product.title || product.name || "Untitled", 90);
    var vendor = cleanText(product.vendor || source.label, 42);
    var type = cleanText(product.product_type || product.type || "", 48);
    var tags = tagsFor(product).slice(0, 8);
    var description = cleanText(product.body_html || product.description || "", 220);
    var price = lowestPrice(product);
    var images = productImages(source, product, 3);
    if (!title || !images.length) return null;
    var catLabel = CAT_LABEL[source.category] || "";
    var specParts = [vendor, type, price].filter(Boolean);
    var semantic = buildArbiterCandidateText(source, product, title, type, tags, description);
    return {
      name: title, category: source.category, catLabel: catLabel, weight: source.weight,
      img: images[0], images: images, url: productUrl(source, product),
      source: source.label + (price ? " \u00b7 from " + price : ""),
      spec: specParts.length ? specParts.join(" \u00b7 ") : source.label, vibe: semantic.slice(0, 1100)
    };
  }
  function uniqueProducts(items) {
    var seen = {}, out = [];
    items.forEach(function (item) { if (!item) return; var key = (item.name + "|" + item.img).toLowerCase(); if (seen[key]) return; seen[key] = true; out.push(item); });
    return out;
  }
  function shuffle(arr) { for (var i = arr.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)), t = arr[i]; arr[i] = arr[j]; arr[j] = t; } return arr; }

  function parseJSON(text) {
    try { return JSON.parse(text); }
    catch (e) { var a = text.indexOf("{"), b = text.lastIndexOf("}"); if (a >= 0 && b > a) return JSON.parse(text.slice(a, b + 1)); throw e; }
  }
  function proxied(url) {
    return [
      url,
      "https://corsproxy.io/?url=" + encodeURIComponent(url),
      "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url),
      "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
      "https://thingproxy.freeboard.io/fetch/" + url
    ];
  }
  function fetchJSON(url) {
    var attempts = proxied(url), last = null;
    return attempts.reduce(function (chain, next) {
      return chain.catch(function () {
        return fetch(next, { cache: "no-store" }).then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); }).then(parseJSON).catch(function (e) { last = e; throw e; });
      });
    }, Promise.reject()).catch(function () { throw last || new Error("fetch failed"); });
  }
  function fetchSource(source) {
    return fetchJSON(source.feed).then(function (data) {
      var products = Array.isArray(data.products) ? data.products : [];
      var out = [];
      for (var i = 0; i < products.length && out.length < PER_SOURCE_CAP; i++) { var n = normalizeProduct(source, products[i]); if (n) out.push(n); }
      return out;
    });
  }
  function rebuildIndex() { byText = {}; catalog.forEach(function (u) { byText[u.vibe] = u; }); }

  function imgKey(src) { return String(src).split("?")[0].toLowerCase(); }

  function appendHero(items) {
    var pics = [];
    items.forEach(function (u) { u.images.forEach(function (src) { pics.push({ src: src, item: u }); }); });
    shuffle(pics);
    var added = 0, seenProd = {};
    for (var i = 0; i < pics.length; i++) {
      if (heroCount >= HERO_MAX || added >= HERO_PER_SOURCE) break;
      var p = pics[i], k = imgKey(p.src);
      if (heroSeen[k] || seenProd[p.item.name]) continue;
      heroSeen[k] = true; seenProd[p.item.name] = true;
      var a = document.createElement("a");
      a.className = "sfig";
      a.href = p.item.url; a.target = "_blank"; a.rel = "noopener noreferrer";
      a.innerHTML =
        '<img loading="eager" decoding="async" referrerpolicy="no-referrer" src="' + escapeHTML(p.src) + '" alt="' + escapeHTML(p.item.name) + '" onload="this.classList.add(\'in\')" onerror="this.closest(\'.sfig\').classList.add(\'dead\')" />' +
        '<span class="tag">' + escapeHTML(p.item.catLabel || p.item.source) + '</span>';
      heroPrimaryStacks[heroCount % heroPrimaryStacks.length].appendChild(a);
      heroCount++; added++;
    }
    syncHeroMirrors();
  }

  // progressive: each house streams into the hero the moment it resolves
  function loadCatalog() {
    if (catalogPromise) return catalogPromise;
    var jobs = PRODUCT_SOURCES.map(function (s) {
      return fetchSource(s).then(function (items) {
        if (!items.length) return;
        catalog = uniqueProducts(catalog.concat(items));
        rebuildIndex();
        live.push(s.label);
        appendHero(items);
        srclineEl.classList.remove("err");
        srclineEl.textContent = live.length + " houses live";
      }).catch(function () {});
    });
    catalogPromise = Promise.allSettled(jobs).then(function () {
      if (!catalog.length) { srclineEl.classList.add("err"); srclineEl.textContent = "field offline — connect the catalog relay"; }
      return catalog;
    });
    return catalogPromise;
  }

  function activeCandidates() {
    var pool = activeCategory === "all" ? catalog : catalog.filter(function (u) { return u.category === activeCategory; });
    return pool.slice(0, CANDIDATE_LIMIT);
  }
  function normalizeRanked(data, sent) {
    var rows = [];
    if (data && Array.isArray(data.all)) rows = data.all;
    else if (data && Array.isArray(data.results)) rows = data.results;
    else if (data && Array.isArray(data.matches)) rows = data.matches;
    else if (data && Array.isArray(data.rankings)) rows = data.rankings;
    else if (Array.isArray(data)) rows = data;
    rows = rows.map(function (row) {
      var text = row.text || row.candidate || row.item || row.document || row.label || row.body || row.input;
      var score = row.score; if (score == null) score = row.coherence; if (score == null) score = row.similarity; if (score == null) score = row.value;
      return { text: text, score: Number(score) };
    }).filter(function (row) { return row.text && Number.isFinite(row.score); });
    if (!rows.length && data && Array.isArray(data.scores)) {
      rows = data.scores.map(function (s, i) { return { text: sent[i] && sent[i].vibe, score: Number(s) }; }).filter(function (r) { return r.text && Number.isFinite(r.score); });
    }
    if (!rows.length) throw new Error("no coherence in ARBITER response");
    return rows.slice().sort(function (a, b) { return b.score - a.score; });
  }
  function postCompare(endpoint, query, items) {
    return fetch(endpoint, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ query: query, candidates: items.map(function (u) { return u.vibe; }) }) })
      .then(function (r) { if (!r.ok) throw new Error(endpoint + " " + r.status); return r.json(); }).then(function (d) { return normalizeRanked(d, items); });
  }
  function compareArbiter(query, items) {
    var first = null;
    return ENDPOINTS.reduce(function (chain, ep) { return chain.catch(function (e) { if (!first) first = e; return postCompare(ep, query, items); }); }, Promise.reject())
      .catch(function () { throw first || new Error("ARBITER unreachable"); });
  }
  function setStatus(msg) { statusEl.textContent = msg; }

  function run() {
    var query = qEl.value.trim();
    if (!query) { qEl.focus(); return; }
    resultsEl.classList.add("on");
    saidEl.textContent = query;
    readoutEl.innerHTML = ""; leadEl.className = "lead"; leadEl.innerHTML = ""; gridEl.innerHTML = "";
    setStatus("reading…");
    goEl.disabled = true;
    resultsEl.scrollIntoView({ behavior: "smooth", block: "start" });

    loadCatalog().then(function () {
      var items = activeCandidates();
      if (!items.length) throw new Error("nothing live here yet — feeds may be blocked");
      setStatus("ranking " + items.length + " looks…");
      return compareArbiter(query, items);
    }).then(render).catch(function (e) { setStatus(e.message); }).finally(function () { goEl.disabled = false; });
  }

  function render(ranked) {
    var usable = ranked.filter(function (r) { return byText[r.text] && byText[r.text].img; });
    if (!usable.length) throw new Error("ranked items did not map back to imagery");
    var top = usable[0].score, second = usable.length > 1 ? usable[1].score : top, lead = top - second;

    setStatus(usable.length + " looks read · lead +" + lead.toFixed(3));
    readoutEl.innerHTML =
      '<div><span class="k">Looks</span><span class="v">' + usable.length + '</span></div>' +
      '<div><span class="k">Top</span><span class="v">' + top.toFixed(3) + '</span></div>' +
      '<div><span class="k">Gap</span><span class="v">+' + lead.toFixed(3) + '</span></div>';

    var hu = byText[usable[0].text];
    leadEl.className = "lead on";
    leadEl.innerHTML =
      '<a class="lead-shot" href="' + escapeHTML(hu.url) + '" target="_blank" rel="noopener noreferrer">' +
        '<img referrerpolicy="no-referrer" src="' + escapeHTML(hu.img) + '" alt="' + escapeHTML(hu.name) + '" onerror="this.closest(\'.lead-shot\').classList.add(\'dead\')" /><span class="lead-rank">01</span>' +
      '</a>' +
      '<div class="lead-meta">' +
        '<div class="lead-tag">Best match' + (hu.catLabel ? ' \u00b7 ' + escapeHTML(hu.catLabel) : '') + '</div>' +
        '<div class="lead-name"><a href="' + escapeHTML(hu.url) + '" target="_blank" rel="noopener noreferrer">' + escapeHTML(hu.name) + '</a></div>' +
        '<div class="lead-spec">' + escapeHTML(hu.source) + '</div>' +
        '<div class="lead-copy">' + escapeHTML(productNarrative(hu.vibe)) + '</div>' +
        '<div class="lead-score"><span class="big">' + top.toFixed(3) + '</span><span class="lab">coherence · leads +' + lead.toFixed(3) + '</span></div>' +
        '<a class="lead-cta" href="' + escapeHTML(hu.url) + '" target="_blank" rel="noopener noreferrer">View product</a>' +
      '</div>';

    gridEl.innerHTML = usable.slice(1).map(function (r, idx) {
      var u = byText[r.text], rank = ("0" + (idx + 2)).slice(-2);
      return '<article class="tile" style="animation-delay:' + (idx * 30) + 'ms">' +
        '<a class="tile-shot" href="' + escapeHTML(u.url) + '" target="_blank" rel="noopener noreferrer">' +
          '<img loading="lazy" referrerpolicy="no-referrer" src="' + escapeHTML(u.img) + '" alt="' + escapeHTML(u.name) + '" onerror="this.closest(\'.tile-shot\').classList.add(\'dead\')" />' +
          '<span class="tile-rank">' + rank + '</span><span class="tile-score">' + r.score.toFixed(3) + '</span>' +
        '</a>' +
        '<div class="tile-body">' +
          '<div class="tile-name"><a href="' + escapeHTML(u.url) + '" target="_blank" rel="noopener noreferrer">' + escapeHTML(u.name) + '</a></div>' +
          '<div class="tile-meta">' + escapeHTML(u.source) + '</div>' +
          '<a class="tile-shop" href="' + escapeHTML(u.url) + '" target="_blank" rel="noopener noreferrer">Open \u2192</a>' +
        '</div>' +
      '</article>';
    }).join("");
  }

  goEl.addEventListener("click", run);
  qEl.addEventListener("keydown", function (e) { if (e.key === "Enter") run(); });
  loadCatalog();
})();
</script>
