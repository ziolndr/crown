<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CROWN</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,401,500,600,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0b0c;
    --bg-2: #151517;
    --tile: #1b1b1d;
    --white: #f4f2ee;
    --dim: rgba(244,242,238,0.62);
    --faint: rgba(244,242,238,0.40);
    --line: rgba(244,242,238,0.16);
    --line-2: rgba(244,242,238,0.10);
    --font: "Switzer", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  img { display: block; }

  /* ---------- hero: full-viewport streaming image grid ---------- */
  .hero {
    position: relative;
    height: 100svh;
    min-height: 560px;
    overflow: hidden;
    background: var(--bg);
  }
  .hgrid {
    position: absolute;
    inset: 0;
    column-count: 6;
    column-gap: 4px;
    padding: 4px;
    overflow: hidden;
  }
  .sfig {
    position: relative;
    display: block;
    width: 100%;
    margin-bottom: 4px;
    background: var(--tile);
    overflow: hidden;
    break-inside: avoid;
  }
  .sfig img {
    width: 100%;
    height: auto;
    object-fit: cover;
    opacity: 0;
    transform: scale(1.02);
    transition: opacity .7s ease, transform 1.2s ease;
  }
  .sfig img.in { opacity: 1; transform: none; }
  .sfig.dead { display: none; }
  .sfig::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(11,11,12,0) 55%, rgba(11,11,12,0.5) 100%);
    opacity: 0; transition: opacity .3s ease;
    pointer-events: none;
  }
  .sfig:hover::after { opacity: 1; }
  .sfig .tag {
    position: absolute; left: 10px; bottom: 9px;
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--white); opacity: 0; transform: translateY(4px);
    transition: opacity .25s ease, transform .25s ease; z-index: 2;
  }
  .sfig:hover .tag { opacity: 1; transform: none; }

  .scrim {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background:
      radial-gradient(120% 95% at 50% 46%, rgba(11,11,12,0.74) 0%, rgba(11,11,12,0.30) 42%, rgba(11,11,12,0.06) 70%),
      linear-gradient(180deg, rgba(11,11,12,0.66) 0%, rgba(11,11,12,0) 22%, rgba(11,11,12,0) 74%, rgba(11,11,12,0.72) 100%);
  }

  .hbar {
    position: absolute; z-index: 4; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: clamp(16px, 2.4vw, 26px) clamp(16px, 3vw, 34px);
    flex-wrap: wrap;
  }
  .word {
    font-weight: 700;
    font-size: clamp(19px, 2.2vw, 26px);
    letter-spacing: 0.26em;
    text-shadow: 0 2px 18px rgba(0,0,0,0.55);
  }
  .scope { display: flex; gap: 4px 20px; flex-wrap: wrap; }
  .scope button {
    background: none; border: 0; cursor: pointer;
    color: var(--faint);
    font-family: var(--font);
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 4px 0;
    border-bottom: 1px solid transparent;
    text-shadow: 0 2px 14px rgba(0,0,0,0.5);
    transition: color .15s ease, border-color .15s ease;
  }
  .scope button:hover { color: var(--white); }
  .scope button[aria-pressed="true"] { color: var(--white); border-color: var(--white); }

  .hcenter {
    position: absolute; z-index: 4; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: min(720px, calc(100% - 36px));
    text-align: center;
    display: grid; gap: 22px; justify-items: center;
  }
  .tagline {
    font-weight: 500;
    font-size: clamp(13px, 1.5vw, 16px);
    letter-spacing: 0.04em;
    color: var(--dim);
    text-shadow: 0 2px 20px rgba(0,0,0,0.6);
  }
  .lede {
    font-weight: 600;
    font-size: clamp(34px, 6vw, 72px);
    line-height: 0.98;
    letter-spacing: -0.03em;
    text-shadow: 0 4px 40px rgba(0,0,0,0.55);
  }
  .search-line {
    width: 100%;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1.5px solid rgba(244,242,238,0.7);
    padding-bottom: 14px;
    transition: border-color .2s ease;
  }
  .search-line:focus-within { border-color: var(--white); }
  #q {
    flex: 1; min-width: 0;
    background: none; border: 0; outline: 0;
    color: var(--white);
    font-family: var(--font);
    font-weight: 500;
    font-size: clamp(18px, 2.4vw, 27px);
    letter-spacing: -0.01em;
    text-shadow: 0 2px 18px rgba(0,0,0,0.55);
  }
  #q::placeholder { color: rgba(244,242,238,0.5); font-weight: 400; }
  #go {
    flex: 0 0 auto;
    width: 46px; height: 46px;
    background: var(--white); color: var(--bg);
    border: 0; cursor: pointer;
    font-size: 20px; line-height: 1;
    display: grid; place-items: center;
    transition: background .15s ease, transform .15s ease;
  }
  #go:hover { transform: translateX(2px); }
  #go:disabled { opacity: .5; cursor: default; transform: none; }

  .feelings { display: flex; flex-wrap: wrap; gap: 8px 8px; justify-content: center; }
  .feelings button {
    background: rgba(11,11,12,0.4);
    border: 1px solid var(--line);
    color: var(--dim);
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 13px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: color .15s ease, border-color .15s ease, background .15s ease;
  }
  .feelings button:hover { color: var(--white); border-color: var(--white); background: rgba(11,11,12,0.6); }

  .hfoot {
    position: absolute; z-index: 4; left: clamp(16px, 3vw, 34px); bottom: clamp(14px, 2vw, 22px);
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--faint);
    text-shadow: 0 2px 14px rgba(0,0,0,0.5);
  }
  .hfoot.err { color: var(--white); }

  /* ---------- results ---------- */
  .results { display: none; }
  .results.on { display: block; }

  .rhead {
    display: flex; justify-content: space-between; align-items: flex-end; gap: 28px;
    flex-wrap: wrap;
    padding: clamp(28px, 4vw, 56px) clamp(16px, 3vw, 34px) clamp(18px, 2.4vw, 28px);
    border-bottom: 1px solid var(--line-2);
  }
  .rhead .said-k { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--faint); margin-bottom: 14px; }
  .rhead .said {
    font-weight: 600;
    font-size: clamp(30px, 5vw, 62px);
    line-height: 0.96;
    letter-spacing: -0.025em;
    max-width: 18ch;
  }
  .readout { display: flex; gap: 28px; flex-wrap: wrap; }
  .readout .k { display: block; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--faint); margin-bottom: 6px; }
  .readout .v { display: block; font-weight: 600; font-size: 26px; font-variant-numeric: tabular-nums; }

  .rstatus {
    padding: 14px clamp(16px, 3vw, 34px);
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--faint);
    border-bottom: 1px solid var(--line-2);
  }

  .lead { display: none; }
  .lead.on { display: grid; grid-template-columns: 1.25fr 1fr; }
  .lead-shot { position: relative; background: var(--tile); min-height: clamp(380px, 62vh, 760px); overflow: hidden; }
  .lead-shot img { width: 100%; height: 100%; object-fit: cover; }
  .lead-shot.dead img { display: none; }
  .lead-rank { position: absolute; top: 16px; left: 20px; font-weight: 700; font-size: clamp(34px, 5vw, 64px); letter-spacing: -0.02em; mix-blend-mode: difference; color: #fff; }
  .lead-meta { padding: clamp(26px, 3.4vw, 52px); display: flex; flex-direction: column; justify-content: center; gap: 16px; border-left: 1px solid var(--line-2); }
  .lead-tag { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--faint); }
  .lead-name { font-weight: 600; font-size: clamp(26px, 3.4vw, 46px); line-height: 1.0; letter-spacing: -0.02em; }
  .lead-name a:hover { color: var(--dim); }
  .lead-spec { font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--faint); }
  .lead-copy { font-size: 15px; line-height: 1.62; color: var(--dim); max-width: 52ch; }
  .lead-score { display: flex; align-items: baseline; gap: 12px; }
  .lead-score .big { font-weight: 700; font-size: 40px; font-variant-numeric: tabular-nums; }
  .lead-score .lab { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--faint); }
  .lead-cta {
    margin-top: 6px; width: max-content;
    background: var(--white); color: var(--bg);
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600;
    padding: 13px 20px; transition: opacity .15s ease;
  }
  .lead-cta:hover { opacity: 0.82; }

  .gridhead { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; flex-wrap: wrap; padding: clamp(22px,3vw,36px) clamp(16px,3vw,34px) 16px; }
  .gridhead h2 { font-weight: 600; font-size: clamp(15px, 1.8vw, 19px); letter-spacing: 0.04em; }
  .gridhead .note { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--faint); }

  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
  .tile { display: flex; flex-direction: column; background: var(--bg-2); opacity: 0; transform: translateY(10px); animation: rise .5s ease forwards; }
  .tile-shot { position: relative; aspect-ratio: 3 / 4; background: var(--tile); overflow: hidden; }
  .tile-shot img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s ease; }
  .tile:hover .tile-shot img { transform: scale(1.04); }
  .tile-shot.dead img { display: none; }
  .tile-shot.dead::after { content: "unavailable"; position: absolute; inset: 0; display: grid; place-items: center; color: var(--faint); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; }
  .tile-rank { position: absolute; top: 10px; left: 12px; font-weight: 700; font-size: 26px; mix-blend-mode: difference; color: #fff; }
  .tile-score { position: absolute; top: 12px; right: 12px; font-weight: 600; font-size: 14px; font-variant-numeric: tabular-nums; background: rgba(11,11,12,0.5); padding: 3px 7px; }
  .tile-body { padding: 14px 14px 18px; display: grid; gap: 7px; }
  .tile-name { font-weight: 600; font-size: 17px; line-height: 1.12; letter-spacing: -0.01em; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; }
  .tile-name a:hover { color: var(--dim); }
  .tile-meta { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--faint); }
  .tile-shop { margin-top: 2px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); }
  .tile-shop:hover { color: var(--white); }

  @keyframes rise { to { opacity: 1; transform: none; } }

  @media (max-width: 1200px) { .hgrid { column-count: 5; } }
  @media (max-width: 980px) {
    .hgrid { column-count: 4; }
    .lead.on { grid-template-columns: 1fr; }
    .lead-meta { border-left: 0; border-top: 1px solid var(--line-2); }
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 680px) { .hgrid { column-count: 3; } .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 460px) { .hgrid { column-count: 2; } .readout { gap: 20px; } }

  @media (prefers-reduced-motion: reduce) {
    .sfig img, .tile { transition: none !important; animation: none !important; opacity: 1 !important; transform: none !important; }
  }
</style>
</head>
<body>
  <section class="hero">
    <div class="hgrid" id="hgrid" aria-hidden="true"></div>
    <div class="scrim" aria-hidden="true"></div>

    <div class="hbar">
      <div class="word">CROWN</div>
      <nav class="scope" id="scope" aria-label="Category"></nav>
    </div>

    <div class="hcenter">
      <div class="tagline">Type a feeling, not a filter</div>
      <div class="search-line">
        <input id="q" type="text" autocomplete="off" spellcheck="false" placeholder="describe a feeling" aria-label="Describe the feeling you want" />
        <button id="go" type="button" aria-label="Search">&rarr;</button>
      </div>
      <div class="feelings" id="feelings"></div>
    </div>

    <div class="hfoot" id="srcline"></div>
  </section>

  <section class="results" id="results" aria-live="polite">
    <div class="rhead">
      <div>
        <div class="said-k">You said</div>
        <div class="said" id="said"></div>
      </div>
      <div class="readout" id="readout"></div>
    </div>
    <div class="rstatus" id="status"></div>
    <article class="lead" id="lead"></article>
    <div class="gridhead">
      <h2>More</h2>
      <div class="note">Ranked by meaning · the gap is the signal</div>
    </div>
    <div class="grid" id="grid"></div>
  </section>

<script>
(function () {
  "use strict";

  var ENDPOINTS = [
    "http://localhost:8000/v1/compare",
    "http://127.0.0.1:8000/v1/compare",
    "https://api.arbiter.traut.ai/public/compare"
  ];
  var CANDIDATE_LIMIT = 110;
  var PER_SOURCE_CAP = 14;
  var HERO_MAX = 48;

  var PRODUCT_SOURCES = [
    { label: "Hanifa", category: "fashion", weight: 0, home: "https://hanifa.co", feed: "https://hanifa.co/products.json?limit=250" },
    { label: "Andrea Iyamah", category: "fashion", weight: 0, home: "https://www.andreaiyamah.com", feed: "https://www.andreaiyamah.com/products.json?limit=250" },
    { label: "Fe Noel", category: "fashion", weight: 0, home: "https://fenoel.com", feed: "https://fenoel.com/products.json?limit=250" },
    { label: "Kai Collective", category: "fashion", weight: 0, home: "https://kaicollective.com", feed: "https://kaicollective.com/products.json?limit=250" },
    { label: "Brandon Blackwood", category: "fashion", weight: 1, home: "https://brandonblackwood.com", feed: "https://brandonblackwood.com/products.json?limit=250" },
    { label: "The Lip Bar", category: "makeup", weight: 1, home: "https://thelipbar.com", feed: "https://thelipbar.com/products.json?limit=250" },
    { label: "Juvia's Place", category: "makeup", weight: 1, home: "https://www.juviasplace.com", feed: "https://www.juviasplace.com/products.json?limit=250" },
    { label: "Mented", category: "makeup", weight: 1, home: "https://www.mentedcosmetics.com", feed: "https://www.mentedcosmetics.com/products.json?limit=250" },
    { label: "Pattern Beauty", category: "hair", weight: 1, home: "https://patternbeauty.com", feed: "https://patternbeauty.com/products.json?limit=250" },
    { label: "Bread Beauty", category: "hair", weight: 2, home: "https://breadbeautysupply.com", feed: "https://breadbeautysupply.com/products.json?limit=250" },
    { label: "Luvme Hair", category: "hair", weight: 1, home: "https://shop.luvmehair.com", feed: "https://shop.luvmehair.com/products.json?limit=250", strictHair: true },
    { label: "Topicals", category: "skin", weight: 3, home: "https://topicals.com", feed: "https://topicals.com/products.json?limit=250" },
    { label: "Buttah Skin", category: "skin", weight: 3, home: "https://buttahskin.com", feed: "https://buttahskin.com/products.json?limit=250" },
    { label: "OUI the People", category: "body", weight: 2, home: "https://ouithepeople.com", feed: "https://ouithepeople.com/products.json?limit=250" }
  ];
  var CATEGORIES = [
    { id: "all", label: "All" }, { id: "fashion", label: "Fashion" }, { id: "hair", label: "Hair" },
    { id: "makeup", label: "Makeup" }, { id: "skin", label: "Skin" }, { id: "body", label: "Body" }
  ];
  var CAT_LABEL = { fashion: "Fashion", hair: "Hair", makeup: "Makeup", skin: "Skin", body: "Body" };
  var SEEDS = ["soft life", "villain era", "off-duty money", "wedding guest, untouchable", "clean girl, melanin"];

  var catalog = [];
  var catalogPromise = null;
  var byText = {};
  var activeCategory = "all";
  var heroCount = 0;
  var live = [];

  var qEl = document.getElementById("q");
  var goEl = document.getElementById("go");
  var scopeEl = document.getElementById("scope");
  var feelEl = document.getElementById("feelings");
  var hgridEl = document.getElementById("hgrid");
  var srclineEl = document.getElementById("srcline");
  var resultsEl = document.getElementById("results");
  var saidEl = document.getElementById("said");
  var readoutEl = document.getElementById("readout");
  var statusEl = document.getElementById("status");
  var leadEl = document.getElementById("lead");
  var gridEl = document.getElementById("grid");

  CATEGORIES.forEach(function (c) {
    var b = document.createElement("button");
    b.type = "button"; b.textContent = c.label;
    b.setAttribute("aria-pressed", c.id === activeCategory ? "true" : "false");
    b.addEventListener("click", function () {
      if (activeCategory === c.id) return;
      activeCategory = c.id;
      Array.prototype.forEach.call(scopeEl.children, function (n, i) { n.setAttribute("aria-pressed", CATEGORIES[i].id === activeCategory ? "true" : "false"); });
      if (qEl.value.trim() && resultsEl.classList.contains("on")) run();
    });
    scopeEl.appendChild(b);
  });
  SEEDS.forEach(function (s) {
    var b = document.createElement("button"); b.type = "button"; b.textContent = s;
    b.addEventListener("click", function () { qEl.value = s; run(); });
    feelEl.appendChild(b);
  });

  function escapeHTML(v) { return String(v == null ? "" : v).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
  function decodeHTML(v) { var t = document.createElement("textarea"); t.innerHTML = String(v == null ? "" : v); return t.value; }
  function cleanText(v, max) {
    var s = String(v == null ? "" : v).replace(/<script[\s\S]*?<\/script>/gi, " ").replace(/<style[\s\S]*?<\/style>/gi, " ").replace(/<[^>]+>/g, " ");
    s = decodeHTML(s).replace(/\s+/g, " ").trim();
    return max && s.length > max ? s.slice(0, max).replace(/\s+\S*$/, "") + "\u2026" : s;
  }
  function truncate(v, max) { var s = String(v == null ? "" : v).trim(); return s.length > max ? s.slice(0, max).replace(/\s+\S*$/, "") + "\u2026" : s; }
  function productNarrative(v) { return truncate(String(v || "").replace(/^Real catalog [a-z ]*product\.\s*/i, ""), 300); }

  function absoluteUrl(home, path) {
    if (!path) return "";
    var s = String(path);
    if (s.indexOf("//") === 0) return "https:" + s;
    if (/^https?:\/\//i.test(s)) return s;
    try { return new URL(s, home).href; } catch (e) { return s; }
  }
  function sizedImage(url, w) {
    if (!url) return url;
    if (/cdn\.shopify\.com|\/cdn\/shop\//.test(url)) return url + (url.indexOf("?") >= 0 ? "&" : "?") + "width=" + (w || 1200);
    return url;
  }
  function productUrl(source, product) {
    if (product.url) return absoluteUrl(source.home, product.url);
    if (product.handle) return source.home.replace(/\/$/, "") + "/products/" + encodeURIComponent(product.handle);
    return source.home;
  }
  function productImages(source, product, max) {
    var out = [], imgs = product.images || [];
    for (var i = 0; i < imgs.length && out.length < max; i++) {
      var raw = imgs[i] && (imgs[i].src || (typeof imgs[i] === "string" ? imgs[i] : ""));
      if (raw) out.push(sizedImage(absoluteUrl(source.home, raw), 800));
    }
    if (!out.length) { var single = (product.image && product.image.src) || product.featured_image; if (single) out.push(sizedImage(absoluteUrl(source.home, single), 800)); }
    return out;
  }
  function tagsFor(product) {
    if (Array.isArray(product.tags)) return product.tags.map(cleanText).filter(Boolean);
    return String(product.tags || "").split(",").map(function (t) { return cleanText(t); }).filter(Boolean);
  }
  function isHairLook(product) {
    var hay = [product.title, product.vendor, product.product_type, tagsFor(product).join(" "), cleanText(product.body_html, 260)].join(" ").toLowerCase();
    var look = /(wig|lace front|full lace|hd lace|frontal|closure|bundle|weave|extension|crochet|braid|ponytail|drawstring|half wig|unit|bob|body wave|deep wave|kinky|curly|straight|water wave|loose wave|pixie|bang)/i.test(hay);
    var accessoryOnly = /(shampoo|conditioner|edge control|spray|glue|adhesive|bonnet|brush|comb|cap|stand|tape|wax stick|mousse|serum)/i.test(hay) && !/(wig|lace|frontal|closure|bundle|weave|extension|ponytail|braid|unit)/i.test(hay);
    return look && !accessoryOnly;
  }
  function keepProduct(source, product) {
    var title = String(product.title || product.name || "");
    if (!title) return false;
    if (/gift\s*card|e-?gift|store credit/i.test(title)) return false;
    if (source.strictHair) return isHairLook(product);
    return true;
  }
  function lowestPrice(product) {
    var prices = (product.variants || []).map(function (v) { return parseFloat(v.price); }).filter(function (n) { return Number.isFinite(n); });
    if (!prices.length) return "";
    return "$" + Math.min.apply(Math, prices).toFixed(2).replace(/\.00$/, "");
  }
  function normalizeProduct(source, product) {
    if (!keepProduct(source, product)) return null;
    var title = cleanText(product.title || product.name || "Untitled", 90);
    var vendor = cleanText(product.vendor || source.label, 42);
    var type = cleanText(product.product_type || product.type || "", 48);
    var tags = tagsFor(product).slice(0, 8);
    var description = cleanText(product.body_html || product.description || "", 220);
    var price = lowestPrice(product);
    var images = productImages(source, product, 3);
    if (!title || !images.length) return null;
    var catLabel = CAT_LABEL[source.category] || "";
    var specParts = [vendor, type, price].filter(Boolean);
    var semantic = [
      "Real catalog beauty product.", catLabel ? "Category: " + catLabel + "." : "",
      "Title: " + title + ".", vendor ? "Brand or store: " + vendor + "." : "",
      type ? "Product type: " + type + "." : "", tags.length ? "Tags: " + tags.join(", ") + "." : "",
      description ? "Description: " + description : ""
    ].filter(Boolean).join(" ");
    return {
      name: title, category: source.category, catLabel: catLabel, weight: source.weight,
      img: images[0], images: images, url: productUrl(source, product),
      source: source.label + (price ? " \u00b7 from " + price : ""),
      spec: specParts.length ? specParts.join(" \u00b7 ") : source.label, vibe: semantic.slice(0, 1100)
    };
  }
  function uniqueProducts(items) {
    var seen = {}, out = [];
    items.forEach(function (item) { if (!item) return; var key = (item.name + "|" + item.img).toLowerCase(); if (seen[key]) return; seen[key] = true; out.push(item); });
    return out;
  }
  function shuffle(arr) { for (var i = arr.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)), t = arr[i]; arr[i] = arr[j]; arr[j] = t; } return arr; }

  function parseJSON(text) {
    try { return JSON.parse(text); }
    catch (e) { var a = text.indexOf("{"), b = text.lastIndexOf("}"); if (a >= 0 && b > a) return JSON.parse(text.slice(a, b + 1)); throw e; }
  }
  function proxied(url) {
    return [
      url,
      "https://corsproxy.io/?url=" + encodeURIComponent(url),
      "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url),
      "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
      "https://thingproxy.freeboard.io/fetch/" + url
    ];
  }
  function fetchJSON(url) {
    var attempts = proxied(url), last = null;
    return attempts.reduce(function (chain, next) {
      return chain.catch(function () {
        return fetch(next, { cache: "no-store" }).then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); }).then(parseJSON).catch(function (e) { last = e; throw e; });
      });
    }, Promise.reject()).catch(function () { throw last || new Error("fetch failed"); });
  }
  function fetchSource(source) {
    return fetchJSON(source.feed).then(function (data) {
      var products = Array.isArray(data.products) ? data.products : [];
      var out = [];
      for (var i = 0; i < products.length && out.length < PER_SOURCE_CAP; i++) { var n = normalizeProduct(source, products[i]); if (n) out.push(n); }
      return out;
    });
  }
  function rebuildIndex() { byText = {}; catalog.forEach(function (u) { byText[u.vibe] = u; }); }

  function appendHero(items) {
    var pics = [];
    items.forEach(function (u) { u.images.forEach(function (src) { pics.push({ src: src, item: u }); }); });
    shuffle(pics);
    var frag = document.createDocumentFragment();
    pics.forEach(function (p) {
      if (heroCount >= HERO_MAX) return;
      heroCount++;
      var a = document.createElement("a");
      a.className = "sfig";
      a.href = p.item.url; a.target = "_blank"; a.rel = "noopener noreferrer";
      a.innerHTML =
        '<img loading="eager" decoding="async" referrerpolicy="no-referrer" src="' + escapeHTML(p.src) + '" alt="' + escapeHTML(p.item.name) + '" onload="this.classList.add(\'in\')" onerror="this.closest(\'.sfig\').classList.add(\'dead\')" />' +
        '<span class="tag">' + escapeHTML(p.item.catLabel || p.item.source) + '</span>';
      frag.appendChild(a);
    });
    hgridEl.appendChild(frag);
  }

  // progressive: each house streams into the hero the moment it resolves
  function loadCatalog() {
    if (catalogPromise) return catalogPromise;
    var jobs = PRODUCT_SOURCES.map(function (s) {
      return fetchSource(s).then(function (items) {
        if (!items.length) return;
        catalog = uniqueProducts(catalog.concat(items));
        rebuildIndex();
        live.push(s.label);
        appendHero(items);
        srclineEl.classList.remove("err");
        srclineEl.textContent = live.length + " houses live";
      }).catch(function () {});
    });
    catalogPromise = Promise.allSettled(jobs).then(function () {
      if (!catalog.length) { srclineEl.classList.add("err"); srclineEl.textContent = "field offline — connect the catalog relay"; }
      return catalog;
    });
    return catalogPromise;
  }

  function activeCandidates() {
    var pool = activeCategory === "all" ? catalog : catalog.filter(function (u) { return u.category === activeCategory; });
    return pool.slice(0, CANDIDATE_LIMIT);
  }
  function normalizeRanked(data, sent) {
    var rows = [];
    if (data && Array.isArray(data.all)) rows = data.all;
    else if (data && Array.isArray(data.results)) rows = data.results;
    else if (data && Array.isArray(data.matches)) rows = data.matches;
    else if (data && Array.isArray(data.rankings)) rows = data.rankings;
    else if (Array.isArray(data)) rows = data;
    rows = rows.map(function (row) {
      var text = row.text || row.candidate || row.item || row.document || row.label || row.body || row.input;
      var score = row.score; if (score == null) score = row.coherence; if (score == null) score = row.similarity; if (score == null) score = row.value;
      return { text: text, score: Number(score) };
    }).filter(function (row) { return row.text && Number.isFinite(row.score); });
    if (!rows.length && data && Array.isArray(data.scores)) {
      rows = data.scores.map(function (s, i) { return { text: sent[i] && sent[i].vibe, score: Number(s) }; }).filter(function (r) { return r.text && Number.isFinite(r.score); });
    }
    if (!rows.length) throw new Error("no coherence in ARBITER response");
    return rows.slice().sort(function (a, b) { return b.score - a.score; });
  }
  function postCompare(endpoint, query, items) {
    return fetch(endpoint, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ query: query, candidates: items.map(function (u) { return u.vibe; }) }) })
      .then(function (r) { if (!r.ok) throw new Error(endpoint + " " + r.status); return r.json(); }).then(function (d) { return normalizeRanked(d, items); });
  }
  function compareArbiter(query, items) {
    var first = null;
    return ENDPOINTS.reduce(function (chain, ep) { return chain.catch(function (e) { if (!first) first = e; return postCompare(ep, query, items); }); }, Promise.reject())
      .catch(function () { throw first || new Error("ARBITER unreachable"); });
  }
  function setStatus(msg) { statusEl.textContent = msg; }

  function run() {
    var query = qEl.value.trim();
    if (!query) { qEl.focus(); return; }
    resultsEl.classList.add("on");
    saidEl.textContent = query;
    readoutEl.innerHTML = ""; leadEl.className = "lead"; leadEl.innerHTML = ""; gridEl.innerHTML = "";
    setStatus("reading…");
    goEl.disabled = true;
    resultsEl.scrollIntoView({ behavior: "smooth", block: "start" });

    loadCatalog().then(function () {
      var items = activeCandidates();
      if (!items.length) throw new Error("nothing live here yet — feeds may be blocked");
      setStatus("ranking " + items.length + " looks…");
      return compareArbiter(query, items);
    }).then(render).catch(function (e) { setStatus(e.message); }).finally(function () { goEl.disabled = false; });
  }

  function render(ranked) {
    var usable = ranked.filter(function (r) { return byText[r.text] && byText[r.text].img; });
    if (!usable.length) throw new Error("ranked items did not map back to imagery");
    var top = usable[0].score, second = usable.length > 1 ? usable[1].score : top, lead = top - second;

    setStatus(usable.length + " looks read · lead +" + lead.toFixed(3));
    readoutEl.innerHTML =
      '<div><span class="k">Looks</span><span class="v">' + usable.length + '</span></div>' +
      '<div><span class="k">Top</span><span class="v">' + top.toFixed(3) + '</span></div>' +
      '<div><span class="k">Gap</span><span class="v">+' + lead.toFixed(3) + '</span></div>';

    var hu = byText[usable[0].text];
    leadEl.className = "lead on";
    leadEl.innerHTML =
      '<a class="lead-shot" href="' + escapeHTML(hu.url) + '" target="_blank" rel="noopener noreferrer">' +
        '<img referrerpolicy="no-referrer" src="' + escapeHTML(hu.img) + '" alt="' + escapeHTML(hu.name) + '" onerror="this.closest(\'.lead-shot\').classList.add(\'dead\')" /><span class="lead-rank">01</span>' +
      '</a>' +
      '<div class="lead-meta">' +
        '<div class="lead-tag">Best match' + (hu.catLabel ? ' \u00b7 ' + escapeHTML(hu.catLabel) : '') + '</div>' +
        '<div class="lead-name"><a href="' + escapeHTML(hu.url) + '" target="_blank" rel="noopener noreferrer">' + escapeHTML(hu.name) + '</a></div>' +
        '<div class="lead-spec">' + escapeHTML(hu.source) + '</div>' +
        '<div class="lead-copy">' + escapeHTML(productNarrative(hu.vibe)) + '</div>' +
        '<div class="lead-score"><span class="big">' + top.toFixed(3) + '</span><span class="lab">coherence · leads +' + lead.toFixed(3) + '</span></div>' +
        '<a class="lead-cta" href="' + escapeHTML(hu.url) + '" target="_blank" rel="noopener noreferrer">View product</a>' +
      '</div>';

    gridEl.innerHTML = usable.slice(1).map(function (r, idx) {
      var u = byText[r.text], rank = ("0" + (idx + 2)).slice(-2);
      return '<article class="tile" style="animation-delay:' + (idx * 30) + 'ms">' +
        '<a class="tile-shot" href="' + escapeHTML(u.url) + '" target="_blank" rel="noopener noreferrer">' +
          '<img loading="lazy" referrerpolicy="no-referrer" src="' + escapeHTML(u.img) + '" alt="' + escapeHTML(u.name) + '" onerror="this.closest(\'.tile-shot\').classList.add(\'dead\')" />' +
          '<span class="tile-rank">' + rank + '</span><span class="tile-score">' + r.score.toFixed(3) + '</span>' +
        '</a>' +
        '<div class="tile-body">' +
          '<div class="tile-name"><a href="' + escapeHTML(u.url) + '" target="_blank" rel="noopener noreferrer">' + escapeHTML(u.name) + '</a></div>' +
          '<div class="tile-meta">' + escapeHTML(u.source) + '</div>' +
          '<a class="tile-shop" href="' + escapeHTML(u.url) + '" target="_blank" rel="noopener noreferrer">Open \u2192</a>' +
        '</div>' +
      '</article>';
    }).join("");
  }

  goEl.addEventListener("click", run);
  qEl.addEventListener("keydown", function (e) { if (e.key === "Enter") run(); });
  loadCatalog();
})();
</script>
</body>
